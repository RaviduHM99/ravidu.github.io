---
layout: default
---

{% include lang.html %}

<article class="px-1">
  {% assign tab_key = page.title | downcase %}
  {% assign title = site.data.locales[lang].tabs[tab_key] | default: page.title %}
  <h1 class="dynamic-title">{{ title }}</h1>

  <div class="content">
    <div id="publications-container">
      <p class="loading">Loading publications from ORCID...</p>
    </div>
  </div>
</article>

<style>
  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted-color);
  }

  .error {
    border: 1px solid #fcc;
    background: #fee;
    border-radius: 0.5rem;
    padding: 0.9rem;
    color: #b42318;
  }

  .year-heading {
    font-size: 1.25rem;
    margin: 1.75rem 0 1rem;
    padding-bottom: 0.45rem;
    border-bottom: 1px solid var(--main-border-color, #e5e7eb);
  }

  .publication-item {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 1.25rem;
  }

  .publication-number {
    min-width: 1.35rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .publication-content h3 {
    margin: 0 0 0.2rem;
    font-size: 1.05rem;
    line-height: 1.35;
  }

  .journal {
    margin: 0 0 0.35rem;
    font-style: italic;
    color: var(--text-muted-color);
  }
</style>

<script>
  (() => {
    const ORCID_ID = '0009-0009-4544-9542';

    const container = document.getElementById('publications-container');

    const escapeHtml = (value) =>
      String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const sortYears = (years) =>
      years.sort((a, b) => {
        if (a === 'Unknown') return 1;
        if (b === 'Unknown') return -1;
        return Number(b) - Number(a);
      });

    const renderPublications = (payload) => {
      const groups = payload.group || [];

      if (!groups.length) {
        container.innerHTML = '<p>No publications found.</p>';
        return;
      }

      const byYear = {};

      groups.forEach((group) => {
        const summary = (group['work-summary'] || [])[0];

        if (!summary) {
          return;
        }

        const year = summary['publication-date']?.year?.value || 'Unknown';
        byYear[year] = byYear[year] || [];
        byYear[year].push(summary);
      });

      const years = sortYears(Object.keys(byYear));
      let html = '';
      let publicationNumber = 1;

      years.forEach((year) => {
        html += '<h2 class="year-heading">' + escapeHtml(year) + '</h2>';

        byYear[year].forEach((summary) => {
          const title = summary.title?.title?.value || 'Untitled';
          const journal = summary['journal-title']?.value || '';

          const externalIds = summary['external-ids']?.['external-id'] || [];
          const doi = externalIds.find(
            (id) => String(id['external-id-type'] || '').toLowerCase() === 'doi'
          );

          const doiValue = doi?.['external-id-value'];
          const doiLink = doiValue
            ? '<a href="https://doi.org/' +
              encodeURIComponent(doiValue) +
              '" target="_blank" rel="noopener noreferrer">View Publication</a>'
            : '';

          html +=
            '<div class="publication-item">' +
            '<div class="publication-number">' + publicationNumber + '.</div>' +
            '<div class="publication-content">' +
            '<h3>' + escapeHtml(title) + '</h3>' +
            (journal ? '<div class="journal">' + escapeHtml(journal) + '</div>' : '') +
            doiLink +
            '</div>' +
            '</div>';

          publicationNumber += 1;
        });
      });

      container.innerHTML = html;
    };

    const fetchPublications = async () => {
      try {
        const response = await fetch('https://pub.orcid.org/v3.0/' + ORCID_ID + '/works', {
          headers: {
            Accept: 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error('HTTP error ' + response.status);
        }

        const payload = await response.json();
        renderPublications(payload);
      } catch (error) {
        container.innerHTML =
          '<div class="error"><strong>Error:</strong> ' +
          escapeHtml(error.message) +
          '</div>';
      }
    };

    fetchPublications();
  })();
</script>
